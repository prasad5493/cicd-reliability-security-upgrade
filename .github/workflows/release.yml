name: Release - Controlled Deployment

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, for example v1.0.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  pre-release-validation:
    name: Pre-release Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run quality checks
        run: |
          npm run lint
          npm test

      - name: Build Docker image
        run: docker build -t release-platform-demo:${{ inputs.version }} .

      - name: Scan release image
        uses: aquasecurity/trivy-action@0.33.1
        with:
          image-ref: release-platform-demo:${{ inputs.version }}
          format: table
          exit-code: 1
          severity: CRITICAL
          ignore-unfixed: true

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: pre-release-validation
    environment: staging

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy to staging
        run: bash scripts/deploy.sh staging ${{ inputs.version }}

      - name: Upload staging evidence
        uses: actions/upload-artifact@v4
        with:
          name: staging-deployment-evidence-${{ inputs.version }}
          path: evidence/
          retention-days: 30

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy to production
        run: bash scripts/deploy.sh production ${{ inputs.version }}

      - name: Upload production evidence
        uses: actions/upload-artifact@v4
        with:
          name: production-deployment-evidence-${{ inputs.version }}
          path: evidence/
          retention-days: 90