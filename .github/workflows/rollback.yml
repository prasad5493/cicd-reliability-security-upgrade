name: Rollback - Restore Previous Version

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to rollback"
        required: true
        type: choice
        options:
          - staging
          - production
      rollback_version:
        description: "Version to rollback to, for example v1.0.0"
        required: true
        type: string
      reason:
        description: "Reason for rollback"
        required: true
        type: string

permissions:
  contents: read

jobs:
  rollback:
    name: Execute Rollback
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Execute rollback
        run: bash scripts/rollback.sh ${{ inputs.environment }} ${{ inputs.rollback_version }}

      - name: Record rollback reason
        run: |
          echo "Rollback Reason: ${{ inputs.reason }}" >> evidence/rollback-${{ inputs.environment }}-${{ inputs.rollback_version }}.txt

      - name: Upload rollback evidence
        uses: actions/upload-artifact@v4
        with:
          name: rollback-evidence-${{ inputs.environment }}-${{ inputs.rollback_version }}
          path: evidence/
          retention-days: 90